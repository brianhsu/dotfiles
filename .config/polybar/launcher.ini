[colors]
background = #E045457d
foreground = #FFFFFF
disabled = #707880

launcher-foreground = #00FF00
launcher-underline = #00BCD4
gentoo-icon = #938cff

[launcher/base]
height = 24pt
radius = 6

font-0 = "Source Han Sans TW Medium:style=Medium,size=12;3"
font-1 = "Font Awesome 6 Free:size=12;3"
font-2 = "Font Awesome 6 Brands:size=12;3"
font-3 = "Noto Color Emoji:size=12;3"
font-4 = "SauceCodePro Nerd Font:size=12;3"

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
underline-size = 3

padding-left = 2
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

modules-left = gentoo firefox gnucash thunar ristretto evince

cursor-click = pointer
wm-restack = i3
override-redirect = true
monitor = ${env:MONITOR:}

[bar/launcher_DisplayPort-0]
inherit = launcher/base
width = 340
offset-x = -5

[bar/launcher_HDMI-A-0]
inherit = launcher/base
width = 340
offset-x = -5

[module/gentoo]
type = custom/text
format = <label>
format-prefix = "   "
format-prefix-foreground = ${colors.gentoo-icon}
format-padding = 2
label = "Gentoo"
click-left = ~/.config/scripts/polybar/modules/toggle_app_menu.sh &

[module/firefox]
type = custom/text
label = " "
format-padding = 1
format-foreground = #FF9500 
format-underline = ${colors.launcher-underline}
click-left = firefox 

[module/gnucash]
type = custom/text
label = ＄
format-padding = 1
format-margin = 1
format-foreground = #FFFFFF
format-underline = ${colors.launcher-underline}
click-left = gnucash &

[module/thunar]
type = custom/text
label = 
format-padding = 1
format-margin = 1
format-foreground = #438de6
format-underline = ${colors.launcher-underline}
click-left = thunar &

[module/ristretto]
type = custom/text
label = 
format-padding = 1
format-margin = 1
format-foreground = #f5d442
format-underline = ${colors.launcher-underline}
click-left = geeqie &

[module/evince]
type = custom/text
format = 
format-padding = 1
format-margin = 1
format-foreground = #42c8b6
format-underline = ${colors.launcher-underline}
click-left = atril &

[settings]
screenchange-reload = true
pseudo-transparency = true
